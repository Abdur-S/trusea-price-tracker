<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruSea Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; }
        .white-card { background: white; border: 1px solid #e2e8f0; }
        
        /* Static Neon Search Bar (No Blinking) */
        .neon-search-bar {
            position: relative;
            background: #ffffff;
            border-radius: 9999px;
            padding: 3px;
            background-image: linear-gradient(90deg, #00f2fe, #4facfe, #9b51e0, #ff7beb);
        }
        .search-inner { background: white; border-radius: 9999px; }
        
        /* Smooth Hover Effect */
        .neon-search-bar:hover { box-shadow: 0 0 15px rgba(155, 81, 224, 0.3); }
    </style>
</head>
<body x-data="{
    webAppUrl: 'https://script.google.com/macros/s/AKfycbyYroEr756URv4aCt5qXrXjTeWjqoxxE4Z1qAYAm0WHVYPh_jyCrjD-tK1PAA8GjAHMNw/exec',
    searchQuery: '',
    rawProducts: [],
    loading: true,
    async init() {
        let res = await fetch(this.webAppUrl);
        let json = await res.json();
        this.rawProducts = json.data;
        this.loading = false;
        this.renderChart();
    },
    get items() {
        return this.rawProducts.filter(i => i.name.toLowerCase().includes(this.searchQuery.toLowerCase()));
    },
    renderChart() {
        new Chart(document.getElementById('insightsChart'), {
            type: 'bar',
            data: {
                labels: ['TruSea', 'Licious', 'TenderCuts'],
                datasets: [{ data: [1200, 1400, 1300], backgroundColor: ['#06b6d4', '#6366f1', '#a855f7'] }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    }
}" x-init="init()">

    <div class="max-w-7xl mx-auto p-6">
        <header class="mb-10">
            <h1 class="text-3xl font-bold text-slate-900">TruSea <span class="text-cyan-600">Intelligence Portal</span></h1>
            <p class="text-slate-500 text-sm">Professional Market Pricing Dashboard</p>
        </header>

        <!-- Static Neon Search Bar -->
        <div class="mb-10 max-w-2xl mx-auto">
            <div class="neon-search-bar">
                <div class="search-inner flex items-center px-6 py-4">
                    <svg class="w-6 h-6 text-slate-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input x-model="searchQuery" type="text" placeholder="Search fish names..." class="w-full bg-transparent outline-none text-lg text-slate-700 placeholder-slate-400">
                </div>
            </div>
        </div>

        <div x-show="loading" class="text-center py-20 text-slate-500">Syncing latest sheet...</div>

        <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="item in items" :key="item.name">
                <div class="white-card p-6 rounded-2xl shadow-sm hover:shadow-lg transition-all">
                    <h3 class="text-xl font-bold text-slate-900 mb-4" x-text="item.name"></h3>
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 mb-4">
                        <div class="flex justify-between mb-2"><span class="text-slate-500">TruSea Price</span><span class="font-bold text-cyan-700" x-text="'₹' + item.truSeaPerKg"></span></div>
                        <div class="flex justify-between"><span class="text-slate-500">Difference</span><span class="font-bold" :class="parseInt(item.difference) < 0 ? 'text-green-600' : 'text-red-600'" x-text="item.difference"></span></div>
                    </div>
                    <div class="space-y-2">
                        <template x-for="[compName, compObj] in Object.entries(item.competitors)" :key="compName">
                            <div class="flex justify-between text-sm py-1 border-b border-slate-100">
                                <span class="text-slate-600" x-text="compName"></span>
                                <span class="font-bold" x-text="'₹' + compObj.price"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </div>
</body>
</html>
