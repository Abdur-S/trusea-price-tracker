<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruSea Price Tracker</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js Engine -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased" 
      x-data="{
          webAppUrl: 'https://script.google.com/macros/s/AKfycbxXqzJYQ9KITHK_UCZCHLckGKDcaaDa6D7QlMdbDnaxCJ10Wv2Xu0kadsR1q6rqIHCvyg/exec',
          sheetNames: [],
          activeTab: '',
          items: [],
          loading: true,
          async fetchData(targetTab = '') {
              this.loading = true;
              try {
                  let url = this.webAppUrl;
                  if (targetTab) { url += `?sheet=${encodeURIComponent(targetTab)}`; }
                  
                  let response = await fetch(url);
                  let data = await response.json();
                  
                  if (data.tabs) { this.sheetNames = data.tabs; }
                  if (!this.activeTab && this.sheetNames.length > 0) { this.activeTab = this.sheetNames[0]; }
                  this.items = data.items || [];
              } catch (e) {
                  console.error('Data sync failed:', e);
              } finally {
                  this.loading = false;
              }
          }
      }" 
      x-init="fetchData()">

    <div class="min-h-screen p-4 sm:p-8 max-w-7xl mx-auto">
        <!-- Premium Minimal Header -->
        <header class="mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-200 pb-5 gap-3">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-900 flex items-center gap-2">
                    TruSea <span class="text-blue-600 font-semibold text-xs border border-blue-200 px-2.5 py-1 rounded-full bg-blue-50">Price Dashboard</span>
                </h1>
                <p class="text-xs text-slate-500 mt-1 flex items-center gap-1.5">
                    <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    Live Auto-Syncing with Google Sheets Daily
                </p>
            </div>
        </header>

        <!-- Dynamic Categories Scrollable Navigation Bar -->
        <div class="mb-8 overflow-x-auto no-scrollbar flex space-x-2 border-b border-slate-200 pb-3">
            <template x-for="tab in sheetNames" :key="tab">
                <button @click="activeTab = tab; fetchData(tab)"
                        :class="activeTab === tab ? 'bg-blue-600 text-white shadow-sm shadow-blue-600/10 font-semibold' : 'bg-white text-slate-600 hover:bg-slate-100 border-slate-200'"
                        class="px-4 py-2 text-xs sm:text-sm rounded-lg whitespace-nowrap transition-all duration-150 border"
                        x-text="tab">
                </button>
            </template>
        </div>

        <!-- Main Workspace -->
        <main>
            <!-- Spinner -->
            <div x-show="loading" class="flex flex-col items-center justify-center py-24 text-slate-400 gap-2">
                <div class="animate-spin rounded-full h-6 w-6 border-2 border-blue-600 border-t-transparent"></div>
                <span class="text-xs tracking-wide">Fetching prices...</span>
            </div>

            <!-- Empty Grid Warning -->
            <div x-show="!loading && items.length === 0" class="text-center py-16 text-slate-400 text-sm bg-white rounded-xl border border-slate-200">
                No entries detected in this sheet category tab.
            </div>

            <!-- Beautiful Clean Card Grid (Highly Responsive) -->
            <div x-show="!loading && items.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5">
                <template x-for="(item, idx) in items" :key="idx">
                    <div :class="item.isSoldOut ? 'bg-slate-100/70 border-slate-200 opacity-50' : 'bg-white border-slate-200/80 hover:border-blue-200 hover:shadow-md hover:-translate-y-0.5'"
                         class="p-5 rounded-xl border transition-all duration-200 relative overflow-hidden flex flex-col justify-between shadow-sm">
                        
                        <!-- Sold Out Badge Flag -->
                        <div x-show="item.isSoldOut" class="absolute top-0 right-0 bg-red-500 text-white text-[9px] font-bold uppercase px-2.5 py-1 rounded-bl tracking-widest">
                            Sold Out
                        </div>

                        <div>
                            <h3 :class="item.isSoldOut ? 'text-slate-400 line-through' : 'text-slate-900'" class="text-base sm:text-lg font-bold pr-12 leading-snug mb-4" x-text="item.name"></h3>
                            
                            <!-- TruSea Pricing Matrix Block -->
                            <div class="grid grid-cols-2 gap-2.5 mb-4">
                                <div class="bg-slate-50 p-3 rounded-lg border border-slate-100 text-center">
                                    <span class="block text-[10px] uppercase tracking-wider text-slate-400 font-medium mb-0.5">TruSea 500g</span>
                                    <span :class="item.isSoldOut ? 'text-slate-400 line-through' : 'text-blue-600'" class="text-base font-extrabold" x-text="item.truSea500g"></span>
                                </div>
                                <div class="bg-slate-50 p-3 rounded-lg border border-slate-100 text-center">
                                    <span class="block text-[10px] uppercase tracking-wider text-slate-400 font-medium mb-0.5">TruSea /KG</span>
                                    <span :class="item.isSoldOut ? 'text-slate-400 line-through' : 'text-emerald-600'" class="text-base font-extrabold" x-text="item.truSeaKg"></span>
                                </div>
                            </div>
                        </div>

                        <!-- Competitors Listing Section -->
                        <div class="border-t border-slate-100 pt-4 space-y-2 text-xs">
                            <div class="flex justify-between items-center"><span class="text-slate-400">TenderCuts</span><span class="font-semibold text-slate-700" x-text="item.tenderCuts"></span></div>
                            <div class="flex justify-between items-center"><span class="text-slate-400">Licious</span><span class="font-semibold text-slate-700" x-text="item.licious"></span></div>
                            <div class="flex justify-between items-center"><span class="text-slate-400">Freshma</span><span class="font-semibold text-slate-700" x-text="item.freshma"></span></div>
                            <div class="flex justify-between items-center"><span class="text-slate-400">FreshToHome</span><span class="font-semibold text-slate-700" x-text="item.freshToHome"></span></div>
                            <div class="flex justify-between items-center"><span class="text-slate-400">Supreme Seafoods</span><span class="font-semibold text-slate-700" x-text="item.supreme"></span></div>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>
</body>
</html>
