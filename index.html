<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruSea Intelligence Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased"
      x-data="{
          webAppUrl: 'https://script.google.com/macros/s/AKfycbyUHSU9IBJxa4gkojyq20IncjCQHmgJfKj2TJ4LzFOP-z46RGA8NJOw0i4ofpx5-_kn2w/exec',
          viewMode: 'cards', 
          todayTab: '', yesterdayTab: '', activeTab: '',
          todayItems: [], yesterdayItems: [], displayItems: [],
          loading: true, chartInstance: null,
          aiQuery: '', aiResponse: 'Hello! Ask me to calculate batch prices or compare fish competitors.',
          
          async initEngine() {
              this.loading = true;
              try {
                  let response = await fetch(this.webAppUrl);
                  let data = await response.json();
                  
                  // Safe arrays check to bypass any empty data response blocks
                  let rawItems = [];
                  if (data && data.items) {
                      rawItems = data.items;
                  } else if (Array.isArray(data)) {
                      rawItems = data;
                  }
                  
                  let rawTabs = (data && data.tabs) ? data.tabs : [];
                  if (rawItems.length > 0 && rawItems[0].availableTabs) {
                      rawTabs = rawItems[0].availableTabs;
                  }
                  
                  if (rawTabs.length > 0) {
                      this.todayTab = rawTabs[0];
                      this.yesterdayTab = rawTabs[1] || '';
                      this.activeTab = this.todayTab;
                  }
                  
                  this.todayItems = rawItems;
                  this.displayItems = this.todayItems;
              } catch (e) { 
                  console.error('Initialization failed:', e); 
              } finally {
                  this.loading = false;
              }
          },
          switchTab(tab) {
              this.activeTab = tab;
              this.loading = true;
              // Fetch explicitly selected tab directly from stream link
              fetch(`${this.webAppUrl}?sheet=${encodeURIComponent(tab)}`)
                  .then(r => r.json())
                  .then(data => {
                      this.displayItems = data.items || (Array.isArray(data) ? data : []);
                      this.loading = false;
                      if (this.viewMode === 'analytics') this.renderChart();
                  }).catch(() => { this.loading = false; });
          },
          switchMode(mode) {
              this.viewMode = mode;
              if (mode === 'analytics') { setTimeout(() => this.renderChart(), 100); }
          },
          renderChart() {
              if (this.chartInstance) this.chartInstance.destroy();
              let canvasEl = document.getElementById('marketChart');
              if (!canvasEl) return;
              let ctx = canvasEl.getContext('2d');
              let topFish = this.displayItems.slice(0, 6);
              
              this.chartInstance = new Chart(ctx, {
                  type: 'bar',
                  data: {
                      labels: topFish.map(f => f.name.split('(')[0]),
                      datasets: [
                          { label: 'TruSea /KG', data: topFish.map(f => parseInt(f.truSeaKg?.replace(/[^0-9]/g, '')) || 0), backgroundColor: '#10b981' },
                          { label: 'Licious', data: topFish.map(f => parseInt(f.licious?.replace(/[^0-9]/g, '')) || 0), backgroundColor: '#ef4444' },
                          { label: 'TenderCuts', data: topFish.map(f => parseInt(f.tenderCuts?.replace(/[^0-9]/g, '')) || 0), backgroundColor: '#3b82f6' }
                      ]
                  },
                  options: { responsive: true, plugins: { legend: { position: 'top' } } }
              });
          },
          askAI() {
              let q = this.aiQuery.toLowerCase().trim();
              if (!q) return;
              let found = this.displayItems.find(f => q.includes(f.name.toLowerCase()) || f.name.toLowerCase().split(' ')[0].includes(q.split(' ')[0]));
              
              if (found) {
                  let rawKg = parseInt(found.truSeaKg?.replace(/[^0-9]/g, '')) || 0;
                  let raw500 = parseInt(found.truSea500g?.replace(/[^0-9]/g, '')) || 0;
                  let rate = rawKg || (raw500 * 2);
                  
                  if (q.includes('calculate') || q.includes('cost of') || q.includes('total')) {
                      let kgMatch = q.match(/\d+/);
                      let multiplier = kgMatch ? parseInt(kgMatch[0]) : 1;
                      this.aiResponse = `📊 Calculation: ${multiplier}kg of ${found.name} equals ₹${rate * multiplier}.`;
                  } else {
                      this.aiResponse = `🔍 ${found.name} Status: TruSea price per KG is ₹${rawKg || 'N/A'}. 500g pack is ₹${raw500 || 'N/A'}.`;
                  }
              } else {
                  this.aiResponse = "I couldn't locate that specific fish type. Try asking: 'Calculate 5kg of Barracuda'.";
              }
          }
      }" x-init="initEngine()">

    <div class="min-h-screen p-4 sm:p-8 max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-200 pb-5 gap-3">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-900">TruSea <span class="text-blue-600 font-normal">Intelligence Engine</span></h1>
                <p class="text-xs text-slate-500 mt-1">Live Synchronized Market Comparison System</p>
            </div>
            
            <div class="flex bg-slate-200/80 p-1 rounded-xl border border-slate-300/30 text-xs font-semibold">
                <button @click="switchMode('cards')" :class="viewMode === 'cards' ? 'bg-white shadow text-blue-600' : 'text-slate-600'" class="px-4 py-2 rounded-lg transition">Price Cards</button>
                <button @click="switchMode('analytics')" :class="viewMode === 'analytics' ? 'bg-white shadow text-blue-600' : 'text-slate-600'" class="px-4 py-2 rounded-lg transition">Analytics Charts</button>
                <button @click="switchMode('ai')" :class="viewMode === 'ai' ? 'bg-white shadow text-blue-600' : 'text-slate-600'" class="px-4 py-2 rounded-lg transition">AI Agent Copilot</button>
            </div>
        </header>

        <div class="mb-6 flex items-center gap-2 bg-slate-200/50 p-1 rounded-xl w-fit border border-slate-200/30" x-show="todayTab">
            <button @click="switchTab(todayTab)" :class="activeTab === todayTab ? 'bg-white text-slate-900 shadow-sm font-bold' : 'text-slate-500'" class="px-4 py-1.5 text-xs rounded-lg transition flex flex-col items-center min-w-[120px]">
                <span class="text-[9px] uppercase tracking-wider opacity-60">Today</span>
                <span x-text="todayTab.replace('Updated Prices - ', '')"></span>
            </button>
            <button @click="switchTab(yesterdayTab)" x-show="yesterdayTab" :class="activeTab === yesterdayTab ? 'bg-white text-slate-900 shadow-sm font-bold' : 'text-slate-500'" class="px-4 py-1.5 text-xs rounded-lg transition flex flex-col items-center min-w-[120px]">
                <span class="text-[9px] uppercase tracking-wider opacity-60">Yesterday</span>
                <span x-text="yesterdayTab.replace('Updated Prices - ', '')"></span>
            </button>
        </div>

        <main>
            <div x-show="loading" class="flex flex-col items-center justify-center py-24 text-slate-400 gap-2">
                <div class="animate-spin rounded-full h-5 w-5 border-2 border-blue-600 border-t-transparent"></div>
                <span class="text-xs">Connecting to Google Sheets matrix data stream...</span>
            </div>

            <div x-show="!loading && viewMode === 'cards'" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                <template x-for="item in displayItems" :key="item.name">
                    <div :class="item.isSoldOut ? 'bg-slate-100 opacity-40' : 'bg-white'" class="p-5 rounded-xl border border-slate-200 shadow-sm transition flex flex-col justify-between relative overflow-hidden">
                        <div x-show="item.isSoldOut" class="absolute top-0 right-0 bg-red-500 text-white text-[9px] font-bold uppercase px-2.5 py-1 rounded-bl">Sold Out</div>
                        <div>
                            <h3 class="text-base font-bold text-slate-900 mb-4 truncate" x-text="item.name"></h3>
                            <div class="grid grid-cols-2 gap-2 mb-4">
                                <div class="bg-slate-50 p-2.5 rounded-lg border text-center border-slate-100">
                                    <span class="block text-[9px] uppercase tracking-wider text-slate-400 font-medium">TruSea 500g</span>
                                    <span class="text-base font-black text-blue-600" x-text="item.truSea500g"></span>
                                </div>
                                <div class="bg-slate-50 p-2.5 rounded-lg border text-center border-slate-100">
                                    <span class="block text-[9px] uppercase tracking-wider text-slate-400 font-medium">TruSea /KG</span>
                                    <span class="text-base font-black text-emerald-600" x-text="item.truSeaKg"></span>
                                </div>
                            </div>
                        </div>
                        <div class="border-t pt-3 space-y-1.5 text-xs text-slate-600">
                            <div class="flex justify-between"><span>TenderCuts</span><span class="font-bold text-slate-700" x-text="item.tenderCuts"></span></div>
                            <div class="flex justify-between"><span>Licious</span><span class="font-bold text-slate-700" x-text="item.licious"></span></div>
                            <div class="flex justify-between"><span>Freshma</span><span class="font-bold text-slate-700" x-text="item.freshma"></span></div>
                            <div class="flex justify-between"><span>FreshToHome</span><span class="font-bold text-slate-700" x-text="item.freshToHome"></span></div>
                            <div class="flex justify-between"><span>Supreme Seafoods</span><span class="font-bold text-slate-700" x-text="item.supreme"></span></div>
                        </div>
                    </div>
                </template>
            </div>

            <div x-show="!loading && viewMode === 'analytics'" class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm max-w-4xl mx-auto">
                <h3 class="text-base font-bold text-slate-900 mb-4">Market Competitor Price Spikes</h3>
                <canvas id="marketChart"></canvas>
            </div>

            <div x-show="!loading && viewMode === 'ai'" class="max-w-xl mx-auto bg-white border rounded-xl shadow-sm overflow-hidden">
                <div class="p-5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white">
                    <h3 class="font-bold text-base">TruSea Sales Assistant</h3>
                    <p class="text-xs opacity-80 mt-0.5">Calculations and competitor analysis</p>
                </div>
                <div class="p-5 space-y-4">
                    <div class="bg-slate-50 p-4 rounded-lg border text-sm text-slate-700 border-slate-200/60 font-medium" x-text="aiResponse"></div>
                    <div class="flex gap-2">
                        <input x-model="aiQuery" @keydown.enter="askAI()" type="text" placeholder="e.g., Calculate 5kg of Barracuda..." class="w-full text-sm border p-3 rounded-lg focus:outline-blue-500">
                        <button @click="askAI()" class="bg-slate-900 text-white text-sm font-bold px-5 rounded-lg transition">Ask</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
