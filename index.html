<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruSea Live Pricing Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Premium Flat Neon Outline + Card Grow & Offset Shadow Effect */
        .neon-outline-card {
            position: relative;
            background: #ffffff;
            border-radius: 1rem;
            z-index: 1;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .neon-outline-card::before {
            content: ''; position: absolute; inset: 0; border-radius: 1rem; padding: 2px; 
            background: linear-gradient(90deg, #00f2fe, #4facfe, #00cbff, #00f2fe);
            background-size: 300% 100%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            z-index: 2; opacity: 0; transition: opacity 0.25s ease; pointer-events: none;
        }
        .neon-outline-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0, 242, 254, 0.12), 0 10px 15px rgba(15, 23, 42, 0.06);
        }
        .neon-outline-card:hover::before { opacity: 1; animation: neonOutlineMove 1.5s linear infinite; }
        @keyframes neonOutlineMove { 0% { background-position: 0% 0%; } 100% { background-position: 300% 0%; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased"
      x-data="{
          webAppUrl: 'https://script.google.com/macros/s/AKfycbwUhhHtZIrNJ95ONouhsDg8gdXUiLwj-jyQJGKzt0JF1zaprs4vIk3vgs7vl1OUXKTjVQ/exec',
          searchQuery: '',
          activeSheetName: 'Scanning...',
          rawProducts: [], filteredItems: [],
          highestSeller: 'Calculating...', stableSeller: 'Calculating...',
          loading: true, errorMessage: '', chartInstance: null,
          
          async initEngine() {
              this.loading = true;
              this.errorMessage = '';
              try {
                  let response = await fetch(this.webAppUrl);
                  let resData = await response.json();
                  if (resData.error) { throw new Error(resData.error); }
                  
                  this.activeSheetName = resData.meta.activeSheet || 'Live Dynamic Sheet';
                  this.rawProducts = resData.data || [];
                  this.applyFilters();
              } catch (e) {
                  console.error(e);
                  this.errorMessage = 'Live Sync Fault: Web App connection blocked. Make sure the script deployment is set to Anyone.';
              } finally {
                  this.loading = false;
              }
          },
          applyFilters() {
              let q = this.searchQuery.toLowerCase().trim();
              if (!q) {
                  this.filteredItems = this.rawProducts;
              } else {
                  this.filteredItems = this.rawProducts.filter(item => {
                      let matchName = item.name.toLowerCase().includes(q);
                      let matchComp = Object.keys(item.competitors).some(k => k.toLowerCase().includes(q));
                      return matchName || matchComp;
                  });
              }
              this.calculateMetrics();
          },
          calculateMetrics() {
              if (this.rawProducts.length === 0) return;
              let compTotals = {}; let compCounts = {};
              let totalTruSea = 0, countTruSea = 0;
              
              this.rawProducts.forEach(item => {
                  if (item.isSoldOut) return;
                  let parsedTruSea = parseFloat(item.truSeaPerKg);
                  if (!isNaN(parsedTruSea)) { totalTruSea += parsedTruSea; countTruSea++; }
                  
                  Object.entries(item.competitors).forEach(([key, compObj]) => {
                      let priceVal = parseFloat(compObj.price);
                      if (!isNaN(priceVal) && compObj.status.toLowerCase().includes('in stock')) {
                          compTotals[key] = (compTotals[key] || 0) + priceVal;
                          compCounts[key] = (compCounts[key] || 0) + 1;
                      }
                  });
              });
              
              let averages = [{ name: 'TruSea', avg: countTruSea ? totalTruSea / countTruSea : 0, isBrand: true }];
              Object.keys(compTotals).forEach(key => {
                  averages.push({ name: key, avg: compTotals[key] / compCounts[key], isBrand: false });
              });
              
              averages = averages.filter(c => c.avg > 0);
              let competitorsOnly = averages.filter(c => !c.isBrand);
              competitorsOnly.sort((a, b) => b.avg - a.avg);
              
              if (competitorsOnly.length > 0) {
                  // High cost indicator identifies the max market average markup
                  this.highestSeller = competitorsOnly[0].name + ' (Avg: ₹' + Math.round(competitorsOnly[0].avg) + '/KG)';
                  // Stable baseline cost indicator maps to the median vendor positioning index
                  let middleIdx = Math.floor(competitorsOnly.length / 2);
                  this.stableSeller = competitorsOnly[middleIdx].name + ' (Avg: ₹' + Math.round(competitorsOnly[middleIdx].avg) + '/KG)';
              }
              
              averages.sort((a, b) => b.avg - a.avg);
              setTimeout(() => this.renderChart(averages), 100);
          },
          renderChart(averages) {
              if (this.chartInstance) this.chartInstance.destroy();
              let canvasEl = document.getElementById('insightsChart');
              if (!canvasEl) return;
              
              this.chartInstance = new Chart(canvasEl.getContext('2d'), {
                  type: 'bar',
                  data: {
                      labels: averages.map(c => c.name),
                      datasets: [{
                          data: averages.map(c => Math.round(c.avg)),
                          backgroundColor: averages.map(c => c.isBrand ? '#00f2fe' : '#3b82f6'),
                          borderWidth: averages.map(c => c.isBrand ? 2 : 0),
                          borderColor: '#4facfe', borderRadius: 6
                      }]
                  },
                  options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
              });
          }
      }" x-init="initEngine()">

    <div class="min-h-screen p-4 sm:p-6 max-w-7xl mx-auto">
        <!-- Dashboard Header Framework -->
        <header class="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-200 pb-4 gap-2">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-slate-900">TruSea <span class="text-cyan-500 font-normal">Intelligence Portal</span></h1>
                <p class="text-[10px] text-slate-400 mt-0.5">Live Real-Time Dynamic Auto-Sync Dashboard</p>
            </div>
            <div class="bg-slate-100 text-slate-700 px-3 py-1.5 rounded-xl text-xs font-semibold border border-slate-200 shadow-sm" x-show="!loading">
                Synced Dynamic Sheet: <span class="text-cyan-600 font-bold" x-text="activeSheetName"></span>
            </div>
        </header>

        <!-- Premium Real-time Interactive Search Bar -->
        <div class="mb-6 max-w-md" x-show="!loading && !errorMessage">
            <input x-model="searchQuery" @input="applyFilters()" type="text" placeholder="🔍 Search fish name or competitor brand..." class="w-full text-xs bg-white border border-slate-200 p-3 pl-4 rounded-xl shadow-sm focus:outline-none focus:border-cyan-400 transition-all">
        </div>

        <main class="space-y-6">
            <!-- Loading Status Indicator -->
            <div x-show="loading" class="text-center py-20 text-xs text-slate-400">Syncing dynamic data arrays directly from current layout...</div>
            <div x-show="errorMessage" class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl text-xs font-medium" x-text="errorMessage" style="display: none;"></div>

            <!-- ANCHORED STATISTICAL INSIGHTS & BENCHMARK GRAPHS -->
            <div x-show="!loading && !errorMessage" class="grid grid-cols-1 lg:grid-cols-3 gap-4" style="display: none;">
                <div class="lg:col-span-1 flex flex-col gap-3 justify-between">
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <span class="text-[9px] uppercase font-bold tracking-wider text-red-400 block mb-0.5">🔴 Cost High Competitor</span>
                        <div class="text-base font-black text-slate-900" x-text="highestSeller"></div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <span class="text-[9px] uppercase font-bold tracking-wider text-emerald-500 block mb-0.5">🟢 Stable Cost Competitor</span>
                        <div class="text-base font-black text-slate-900" x-text="stableSeller"></div>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                    <span class="text-[10px] uppercase font-bold tracking-wider text-slate-400 block mb-2">Market Price Benchmark Index Matrix (/KG)</span>
                    <div class="relative h-[110px] w-full"><canvas id="insightsChart"></canvas></div>
                </div>
            </div>

            <!-- PREMIUM MOBILE CARDS DATA GRID LAYOUT -->
            <div x-show="!loading && !errorMessage" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" style="display: none;">
                <template x-for="item in filteredItems" :key="item.name">
                    <div :class="item.isSoldOut ? 'bg-slate-100 opacity-60' : 'neon-outline-card border-slate-200/60'" class="p-5 border flex flex-col justify-between shadow-sm relative">
                        
                        <div>
                            <h3 class="text-sm font-bold text-slate-900 mb-3 truncate" x-text="item.name"></h3>
                            
                            <!-- Mandatory Target Column Groupings (First 3 Mandatory Sheet Elements) -->
                            <div class="space-y-2 mb-4 bg-slate-50 p-3 rounded-xl border border-slate-100">
                                <div class="flex justify-between items-center">
                                    <span class="text-[11px] text-slate-500 font-medium">Current TruSea Price Perkg</span>
                                    <span class="text-xs font-bold text-slate-700" x-text="item.currentTruSeaWebPrice !== '-' ? '₹' + item.currentTruSeaWebPrice : '-'"></span>
                                </div>
                                <div class="flex justify-between items-center border-t border-slate-200/60 pt-2">
                                    <span class="text-[11px] text-slate-900 font-bold">TruSea Price Per Kg</span>
                                    <span class="text-base font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-500 to-blue-600" x-text="item.truSeaPerKg !== '-' ? '₹' + item.truSeaPerKg : '-'"></span>
                                </div>
                                <div class="flex justify-between items-center border-t border-slate-200/60 pt-2">
                                    <span class="text-[11px] text-slate-500 font-medium">Difference</span>
                                    <span :class="parseFloat(item.difference) < 0 ? 'text-emerald-600' : 'text-red-500'" class="text-xs font-bold" x-text="item.difference !== '-' ? (parseFloat(item.difference) > 0 ? '+' + item.difference : item.difference) : '-'"></span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Dynamic Competitor Price & Status Block Rows -->
                        <div class="border-t border-slate-100 pt-2.5 space-y-2 text-xs text-slate-600">
                            <span class="block text-[8px] uppercase tracking-wider text-slate-400 font-bold mb-1">Competitor Pricing Benchmark</span>
                            <template x-for="[compName, compObj] in Object.entries(item.competitors)" :key="compName">
                                <div class="flex justify-between items-center bg-white p-2 rounded-lg border border-slate-100">
                                    <span class="font-medium text-slate-600" x-text="compName"></span>
                                    <div class="flex items-center gap-2">
                                        <span class="font-bold text-slate-800" x-text="compObj.price !== '-' ? '₹' + compObj.price : '-'"></span>
                                        <span :class="compObj.status.toLowerCase().includes('in stock') ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'" 
                                              class="text-[9px] font-bold px-1.5 py-0.5 rounded-md" 
                                              x-text="compObj.status"></span>
                                    </div>
                                </div>
                            </template>
                        </div>

                    </div>
                </template>
            </div>
        </main>
    </div>
</body>
</html>
