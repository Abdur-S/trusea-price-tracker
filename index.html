<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruSea Price Tracker (Last 7 Days)</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2306b6d4'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 11v1c0 1.66 1.34 3 3 3v2.93zm5.9-3.41c-.14-.38-.45-.69-.83-.83L15 13v-2c0-1.1-.9-2-2-2h-2V5.08c2.93.43 5.29 2.54 5.92 5.42h-1.92c-.5 0-.9-.4-.9-.9V8h-1V7h2c1.1 0 2-.9 2-2V4.26c2.42 1.72 4 4.54 4 7.74 0 1.35-.28 2.63-.78 3.8l-1.32-.87z'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @property --gemini-bar-angle {
            syntax: '<angle>'; initial-value: 0deg; inherits: false;
        }
        @keyframes geminiBarRotate {
            0% { --gemini-bar-angle: 0deg; } 100% { --gemini-bar-angle: 360deg; }
        }
        .gemini-ai-search-container {
            position: relative; width: 100%; border-radius: 9999px; padding: 2px; z-index: 10;
        }
        .gemini-ai-search-container::before {
            content: ''; position: absolute; inset: 0; border-radius: 9999px; padding: 2px;
            background: conic-gradient(from var(--gemini-bar-angle), #3085ff, #00f2fe, #4facfe, #9b51e0, #ff7beb, #3085ff);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            animation: geminiBarRotate 5s linear infinite; pointer-events: none; z-index: 2;
        }
        .gemini-ai-search-container::after {
            content: ''; position: absolute; inset: -1px; border-radius: 9999px;
            background: conic-gradient(from var(--gemini-bar-angle), #3085ff, #00f2fe, #4facfe, #9b51e0, #ff7beb, #3085ff);
            animation: geminiBarRotate 5s linear infinite; filter: blur(6px); opacity: 0.2; pointer-events: none; z-index: 1;
        }

        .premium-glow-card {
            position: relative; background: #ffffff !important; border-radius: 1rem; z-index: 1; border: 1px solid #e2e8f0;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .premium-glow-card::before {
            content: ''; position: absolute; inset: -1px; border-radius: 1rem; padding: 1.5px;
            background: linear-gradient(135deg, #00f2fe, #4facfe, #9b51e0, #ff7beb, #00f2fe);
            background-size: 300% 300%; -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; z-index: 2; opacity: 0; transition: opacity 0.3s ease;
        }
        .premium-glow-card:hover {
            transform: translateY(-4px) scale(1.015); border-color: transparent;
            box-shadow: 0 15px 25px rgba(0, 242, 254, 0.12), 0 8px 15px rgba(155, 81, 224, 0.05);
        }
        .premium-glow-card:hover::before { opacity: 1; animation: cardGlowAnimation 3s linear infinite; }
        @keyframes cardGlowAnimation { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-800 font-sans antialiased min-h-screen pb-12"
      x-data="{
          webAppUrl: 'https://script.google.com/macros/s/AKfycbwOJPIxvqYTAEpH-XT8FGCcCnifwHZJQJFt6HCL-bUZaeNoMUGyxag2nAjQxiEPDsyeAg/exec',
          searchQuery: '', rawProducts: [], filteredItems: [],
          highestSeller: 'Calculating...', normalSeller: 'Calculating...',
          rollingDaysCount: 1,
          loading: true, isSyncing: false, errorMessage: '', chartInstance: null,
          
          async initEngine() {
              this.loading = true;
              await this.fetchLivePrices();
              this.loading = false;

              // AUTO SYNC INTERLOCK: background automatic pool loop execution
              setInterval(async () => {
                  await this.fetchLivePrices();
              }, 30000);
          },

          async fetchLivePrices() {
              this.isSyncing = true;
              try {
                  let cacheBuster = new Date().getTime();
                  let response = await fetch(`${this.webAppUrl}?_cb=${cacheBuster}`);
                  let resData = await response.json();
                  
                  this.rawProducts = resData.data || [];
                  this.rollingDaysCount = resData.meta.activeDaysInRollingTrack || 1;
                  
                  this.applyFilters();
                  this.processAnalytics(resData.averages || []);
              } catch (e) {
                  this.errorMessage = 'Syncing latest live dataset parameters...';
              } finally {
                  this.isSyncing = false;
              }
          },

          applyFilters() {
              let q = this.searchQuery.toLowerCase().trim();
              this.filteredItems = q ? this.rawProducts.filter(i => i.name.toLowerCase().includes(q)) : this.rawProducts;
          },

          processAnalytics(averages) {
              if (!averages || averages.length === 0) return;
              
              let competitorsOnly = averages.filter(c => !c.isBrand && c.avg > 0);
              competitorsOnly.sort((a, b) => b.avg - a.avg);
              
              if (competitorsOnly.length > 0) {
                  this.highestSeller = competitorsOnly[0].name + ' (₹' + Math.round(competitorsOnly[0].avg) + '/KG)';
                  this.normalSeller = competitorsOnly[competitorsOnly.length - 1].name + ' (₹' + Math.round(competitorsOnly[competitorsOnly.length - 1].avg) + '/KG)';
              }
              
              setTimeout(() => this.renderChart(averages), 100);
          },

          renderChart(averages) {
              if (this.chartInstance) this.chartInstance.destroy();
              let canvasEl = document.getElementById('insightsChart');
              if (!canvasEl) return;
              
              this.chartInstance = new Chart(canvasEl.getContext('2d'), {
                  type: 'bar',
                  data: {
                      labels: averages.map(c => c.name),
                      datasets: [{
                          data: averages.map(c => Math.round(c.avg)),
                          backgroundColor: averages.map(c => {
                              if (c.isBrand) return '#00f2fe';
                              let name = c.name.toLowerCase();
                              if (name.includes('licious')) return '#4f46e5';
                              if (name.includes('tender')) return '#7c3aed';
                              if (name.includes('fresh ma')) return '#10b981';
                              if (name.includes('fresh to home')) return '#f59e0b';
                              if (name.includes('supreme')) return '#3b82f6';
                              return '#cbd5e1';
                          }),
                          borderRadius: 6, maxBarThickness: 30
                      }]
                  },
                  options: { 
                      responsive: true, maintainAspectRatio: false,
                      plugins: { legend: { display: false } },
                      scales: {
                          y: { ticks: { font: { size: 11 } } },
                          x: { ticks: { font: { size: 12, weight: 'bold' } } }
                      }
                  }
              });
          }
      }" x-init="initEngine()">

    <div class="max-w-7xl mx-auto p-4 sm:p-6">
        <header class="mb-6 border-b border-slate-200 pb-3 flex justify-between items-center">
            <div>
                <h1 class="text-2xl sm:text-3xl font-black text-slate-900 tracking-tight">TruSea <span class="text-cyan-600 font-normal">Price Tracker</span></h1>
                <p class="text-xs text-slate-400 font-semibold mt-0.5" x-text="'Tracking window: Last ' + rollingDaysCount + ' available days metrics'"></p>
            </div>
            
            <div class="flex items-center gap-2 text-xs font-semibold text-slate-500">
                <span class="relative flex h-2 w-2">
                    <span :class="isSyncing ? 'animate-ping bg-amber-400' : 'bg-emerald-500'" class="absolute inline-flex h-full w-full rounded-full opacity-75"></span>
                    <span :class="isSyncing ? 'bg-amber-500' : 'bg-emerald-500'" class="relative inline-flex rounded-full h-2 w-2"></span>
                </span>
                <span x-text="isSyncing ? 'Syncing...' : 'Auto Sync Active'"></span>
            </div>
        </header>

        <div class="mb-6 max-w-xl mx-auto">
            <div class="gemini-ai-search-container">
                <div class="flex items-center w-full bg-white rounded-full px-4 py-2.5 shadow-xs">
                    <input x-model="searchQuery" @input="applyFilters()" type="text" placeholder="Search fish names..." class="w-full text-base bg-transparent border-none focus:outline-none text-slate-800 placeholder-slate-400 font-medium">
                </div>
            </div>
        </div>

        <main class="space-y-6">
            <div x-show="loading" class="text-center py-20 text-xs text-slate-400 font-semibold">Live Real-Time Active Sync Processing...</div>

            <div x-show="!loading" class="grid grid-cols-1 lg:grid-cols-3 gap-4" style="display: none;">
                <div class="lg:col-span-1 flex flex-col gap-3">
                    <div class="bg-white p-4 rounded-xl border border-slate-200">
                        <span class="text-xs uppercase font-bold text-red-500 block mb-1">🔴 Costly Market Vendor (7-day Avg)</span>
                        <div class="text-base font-black text-slate-900" x-text="highestSeller"></div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200">
                        <span class="text-xs uppercase font-bold text-emerald-600 block mb-1">🟢 Normal Market Vendor (7-day Avg)</span>
                        <div class="text-base font-black text-slate-900" x-text="normalSeller"></div>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-white p-4 rounded-xl border border-slate-200">
                    <div class="relative h-[130px] w-full"><canvas id="insightsChart"></canvas></div>
                </div>
            </div>

            <div x-show="!loading" class="max-w-3xl mx-auto text-center" style="display: none;">
                <span class="inline-block text-xs font-semibold text-slate-500 bg-slate-100 border border-slate-200 rounded-full px-4 py-1.5">
                    ⓘ Dashboard averages represent the last rolling 7 days. Individual cards show today's active values.
                </span>
            </div>

            <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" style="display: none;">
                <template x-for="item in filteredItems" :key="item.name">
                    <div class="premium-glow-card p-6 flex flex-col justify-between">
                        <div>
                            <h3 class="text-lg font-extrabold text-slate-900 mb-3 tracking-tight truncate" x-text="item.name"></h3>
                            
                            <div class="space-y-2.5 mb-4 bg-[#FAFAFA] p-4 rounded-lg border border-slate-100 text-sm">
                                <div class="flex justify-between items-center">
                                    <span class="text-slate-500">Current TruSea Website Price</span>
                                    <span class="font-bold text-slate-700" x-text="item.currentTruSeaWebPrice !== '-' ? '₹' + item.currentTruSeaWebPrice : '-'"></span>
                                </div>
                                <div class="flex justify-between items-center border-t border-slate-200/60 pt-2.5">
                                    <span class="text-slate-900 font-bold">Today's Target TruSea Price</span>
                                    <span class="text-lg font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-600 to-blue-600" x-text="item.truSeaPerKg !== '-' ? '₹' + item.truSeaPerKg : '-'"></span>
                                </div>
                                <div class="flex justify-between items-center border-t border-slate-200/60 pt-2.5">
                                    <span class="text-slate-500">Difference</span>
                                    <span :class="parseFloat(item.difference) < 0 ? 'text-emerald-600' : 'text-red-500'" class="font-bold" x-text="item.difference !== '-' ? item.difference : '-'"></span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="border-t border-slate-100 pt-3 space-y-2.5 text-sm text-slate-600">
                            <template x-if="item.competitors">
                                <template x-for="[compName, compVal] in Object.entries(item.competitors)" :key="compName">
                                    <div class="flex justify-between items-center bg-[#FAFAFA] p-2.5 rounded-lg border border-slate-100">
                                        <span class="font-bold text-slate-600" x-text="compName"></span>
                                        <div class="flex items-center gap-2">
                                            <span class="font-extrabold text-slate-900" x-text="compVal.price !== '-' ? '₹' + compVal.price + '/kg' : '-'"></span>
                                            <span :class="compVal.status.toLowerCase().includes('in stock') ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-rose-50 text-rose-700 border-rose-200'" 
                                                  class="text-xs font-bold px-2 py-1 rounded border" x-text="compVal.status || 'Sold Out'"></span>
                                        </div>
                                    </div>
                                </template>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>
</body>
</html>
