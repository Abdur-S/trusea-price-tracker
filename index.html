<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruSea Live Pricing Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Premium Flat Neon Outline + Card Grow & Offset Shadow Effect */
        .neon-outline-card {
            position: relative;
            background: #ffffff;
            border-radius: 1rem;
            z-index: 1;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .neon-outline-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 1rem;
            padding: 2px; 
            background: linear-gradient(90deg, #00f2fe, #4facfe, #00cbff, #00f2fe);
            background-size: 300% 100%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
        }
        .neon-outline-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0, 242, 254, 0.12), 0 10px 15px rgba(15, 23, 42, 0.06);
        }
        .neon-outline-card:hover::before {
            opacity: 1;
            animation: neonOutlineMove 1.5s linear infinite;
        }
        @keyframes neonOutlineMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 300% 0%; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased"
      x-data="{
          webAppUrl: 'https://script.google.com/macros/s/AKfycbwJ0_60b766d1fzA-i1_xa1BYOJy2dfOIXx0TZrV5S5SIc_2i_x4EDoQPyncnMYvzOn6g/exec',
          dateMode: 'today', 
          searchQuery: '',
          todayLabel: 'Today', yesterdayLabel: 'Yesterday',
          todayItems: [], yesterdayItems: [], filteredItems: [],
          highestSeller: 'Calculating...', normalSeller: 'Calculating...',
          loading: true, errorMessage: '', chartInstance: null,
          
          async initEngine() {
              this.loading = true;
              this.errorMessage = '';
              try {
                  let response = await fetch(this.webAppUrl);
                  let data = await response.json();
                  if (data.error) { throw new Error(data.error); }
                  
                  this.todayLabel = data.meta.todayTab || 'Today';
                  this.yesterdayLabel = data.meta.yesterdayTab || 'Yesterday';
                  this.todayItems = data.todayData || [];
                  this.yesterdayItems = data.yesterdayData || [];
                  
                  this.applyFilters();
              } catch (e) {
                  console.error(e);
                  this.errorMessage = 'Live Sync Fault: Unable to resolve cloud data streams.';
              } finally {
                  this.loading = false;
              }
          },
          toggleDate(mode) {
              this.dateMode = mode;
              this.applyFilters();
          },
          applyFilters() {
              let rawList = this.dateMode === 'today' ? this.todayItems : this.yesterdayItems;
              let q = this.searchQuery.toLowerCase().trim();
              
              if (!q) {
                  this.filteredItems = rawList;
              } else {
                  this.filteredItems = rawList.filter(item => {
                      let matchFishName = item.name.toLowerCase().includes(q);
                      let matchCompBrand = Object.keys(item.competitors).some(key => key.toLowerCase().includes(q));
                      return matchFishName || matchCompBrand;
                  });
              }
              this.calculateMarketMetrics();
          },
          calculateMarketMetrics() {
              let activeItems = this.dateMode === 'today' ? this.todayItems : this.yesterdayItems;
              if (activeItems.length === 0) return;
              
              let compTotals = {};
              let compCounts = {};
              let totalTruSea = 0, countTruSea = 0;
              
              activeItems.forEach(item => {
                  if (item.isSoldOut) return;
                  if (item.truSeaKg) { totalTruSea += item.truSeaKg; countTruSea++; }
                  
                  Object.keys(item.competitors).forEach(key => {
                      let val = item.competitors[key];
                      if (val) {
                          compTotals[key] = (compTotals[key] || 0) + val;
                          compCounts[key] = (compCounts[key] || 0) + 1;
                      }
                  });
              });
              
              let averages = [{ name: 'TruSea', avg: countTruSea ? totalTruSea / countTruSea : 0, isBrand: true }];
              Object.keys(compTotals).forEach(key => {
                  averages.push({ name: key, avg: compTotals[key] / compCounts[key], isBrand: false });
              });
              
              averages = averages.filter(c => c.avg > 0);
              if (averages.length === 0) return;
              
              let competitorsOnly = averages.filter(c => !c.isBrand);
              competitorsOnly.sort((a, b) => b.avg - a.avg);
              
              if (competitorsOnly.length > 0) {
                  this.highestSeller = competitorsOnly[0].name + ' (Avg: ₹' + Math.round(competitorsOnly[0].avg) + '/KG)';
                  let middleIdx = Math.floor(competitorsOnly.length / 2);
                  this.normalSeller = competitorsOnly[middleIdx].name + ' (Avg: ₹' + Math.round(competitorsOnly[middleIdx].avg) + '/KG)';
              }
              
              averages.sort((a, b) => b.avg - a.avg);
              setTimeout(() => this.renderInsightsChart(averages), 100);
          },
          renderInsightsChart(averages) {
              if (this.chartInstance) this.chartInstance.destroy();
              let canvasEl = document.getElementById('insightsChart');
              if (!canvasEl) return;
              
              this.chartInstance = new Chart(canvasEl.getContext('2d'), {
                  type: 'bar',
                  data: {
                      labels: averages.map(c => c.name),
                      datasets: [{
                          label: 'Overall Average Price Index /KG',
                          data: averages.map(c => Math.round(c.avg)),
                          backgroundColor: averages.map(c => c.isBrand ? '#00f2fe' : '#3b82f6'),
                          borderWidth: averages.map(c => c.isBrand ? 2 : 0),
                          borderColor: '#4facfe',
                          borderRadius: 6
                      }]
                  },
                  options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
              });
          }
      }" x-init="initEngine()">

    <div class="min-h-screen p-4 sm:p-6 max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-200 pb-4 gap-3">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-slate-900">TruSea <span class="text-cyan-500 font-normal">Intelligence Engine</span></h1>
                <p class="text-[11px] text-slate-400">Live Dynamic Price Tracker</p>
            </div>
            
            <div class="flex bg-slate-200/50 p-1 rounded-xl border border-slate-200/30 text-xs">
                <button @click="toggleDate('today')" :class="dateMode === 'today' ? 'bg-white text-slate-900 shadow-sm font-bold' : 'text-slate-500'" class="px-4 py-1.5 rounded-lg transition-all flex flex-col items-center min-w-[110px]">
                    <span class="text-[8px] uppercase tracking-wider opacity-60">Today</span><span x-text="todayLabel"></span>
                </button>
                <button @click="toggleDate('yesterday')" :class="dateMode === 'yesterday' ? 'bg-white text-slate-900 shadow-sm font-bold' : 'text-slate-500'" class="px-4 py-1.5 rounded-lg transition-all flex flex-col items-center min-w-[110px]">
                    <span class="text-[8px] uppercase tracking-wider opacity-60">Yesterday</span><span x-text="yesterdayLabel"></span>
                </button>
            </div>
        </header>

        <!-- Search Bar Area -->
        <div class="mb-6 max-w-md" x-show="!loading && !errorMessage">
            <div class="relative">
                <input x-model="searchQuery" @input="applyFilters()" type="text" placeholder="Search by fish name or competitor..." class="w-full text-xs bg-white border border-slate-200 p-3 pl-4 rounded-xl shadow-sm focus:outline-none focus:border-cyan-400 transition-all">
            </div>
        </div>

        <main class="space-y-6">
            <div x-show="loading" class="flex flex-col items-center justify-center py-20 text-slate-400 gap-2">
                <div class="animate-spin rounded-full h-5 w-5 border-2 border-cyan-500 border-t-transparent"></div>
                <span class="text-xs">Streaming metrics instantly...</span>
            </div>

            <div x-show="errorMessage" class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl text-xs font-medium" x-text="errorMessage" style="display: none;"></div>

            <!-- INSIGHTS BOXES AND BAR GRAPH -->
            <div x-show="!loading && !errorMessage" class="grid grid-cols-1 lg:grid-cols-3 gap-4" style="display: none;">
                <div class="lg:col-span-1 flex flex-col gap-3 justify-between">
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <span class="text-[9px] uppercase font-bold tracking-wider text-red-400 block mb-0.5">🔴 Highest Cost Competitor</span>
                        <div class="text-base font-black text-slate-900" x-text="highestSeller"></div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <span class="text-[9px] uppercase font-bold tracking-wider text-blue-500 block mb-0.5">🔵 Normal Cost Competitor</span>
                        <div class="text-base font-black text-slate-900" x-text="normalSeller"></div>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                    <div class="relative h-[120px] w-full"><canvas id="insightsChart"></canvas></div>
                </div>
            </div>

            <!-- MOBILE-OPTIMIZED CARDS GRID VIEW -->
            <div x-show="!loading && !errorMessage" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" style="display: none;">
                <template x-for="item in filteredItems" :key="item.name + dateMode">
                    <div :class="item.isSoldOut ? 'bg-slate-100 opacity-40 select-none pointer-events-none border-slate-200' : 'neon-outline-card border-slate-200/60'" class="p-5 border flex flex-col justify-between shadow-sm">
                        <div x-show="item.isSoldOut" class="absolute top-0 right-0 bg-red-500 text-white text-[8px] font-bold uppercase px-2 py-0.5 rounded-bl tracking-widest z-50">Sold Out</div>
                        <div>
                            <h3 :class="item.isSoldOut ? 'text-slate-400 line-through' : 'text-slate-900'" class="text-sm font-bold mb-3 truncate" x-text="item.name"></h3>
                            <div class="mb-3">
                                <div class="bg-gradient-to-br from-slate-50 to-slate-100/30 p-2.5 rounded-xl border border-slate-100 text-center">
                                    <span class="block text-[8px] uppercase tracking-wider text-slate-400 font-bold">TruSea Price /KG</span>
                                    <span class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500" x-text="item.truSeaKg ? '₹' + item.truSeaKg : '-'"></span>
                                </div>
                            </div>
                        </div>
                        <div class="border-t border-slate-100 pt-2.5 space-y-1.5 text-xs text-slate-600">
                            <template x-for="[compName, compPrice] in Object.entries(item.competitors)" :key="compName">
                                <div class="flex justify-between" x-show="compPrice !== null">
                                    <span x-text="compName + ' /KG'"></span>
                                    <span class="font-bold text-slate-700" x-text="'₹' + compPrice"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
            
            <!-- Empty Filter Fallback -->
            <div x-show="filteredItems.length === 0 && !loading" class="text-center text-xs py-10 text-slate-400" style="display: none;">
                No fish species or competitors found matching your criteria.
            </div>
        </main>
    </div>
</body>
</html>
