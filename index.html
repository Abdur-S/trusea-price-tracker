<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruSea Price Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @property --gemini-bar-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes geminiBarRotate { 0% { --gemini-bar-angle: 0deg; } 100% { --gemini-bar-angle: 360deg; } }
        
        .gemini-ai-search-container { position: relative; width: 100%; border-radius: 9999px; padding: 2px; z-index: 10; }
        .gemini-ai-search-container::before {
            content: ''; position: absolute; inset: 0; border-radius: 9999px; padding: 2px;
            background: conic-gradient(from var(--gemini-bar-angle), #3085ff, #00f2fe, #4facfe, #9b51e0, #ff7beb, #3085ff);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            animation: geminiBarRotate 5s linear infinite; pointer-events: none; z-index: 2;
        }

        .premium-glow-card {
            position: relative; border-radius: 1rem; z-index: 1;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .premium-glow-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px rgba(0, 242, 254, 0.12);
        }
    </style>
</head>
<body class="bg-[#F8FAFC] dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans antialiased min-h-screen pb-12"
      x-data="{
          webAppUrl: 'https://script.google.com/macros/s/AKfycbwqvsVkNBSgRxoQRD46Sh5FR4G5m06tK75p7mctmM1PtyG-UzkqJZ3BElSD5yT2AumVWQ/exec',
          searchQuery: '', 
          allMasterData: {}, 
          allMasterAverages: {},
          availableDates: [],
          selectedDate: '',
          filteredItems: [],
          highestSeller: 'Calculating...', normalSeller: 'Calculating...',
          loading: true, isSyncing: false, chartInstance: null,
          selectedCategory: 'All',
          truSeaFilter: 'all',
          activeViewTab: 'dashboard', 
          darkMode: localStorage.getItem('darkMode') === 'true',
          
          async initEngine() {
              if (this.darkMode) document.documentElement.classList.add('dark');
              this.loading = true;
              await this.fetchLivePrices(true);
              this.loading = false;
          },

          toggleTheme() {
              this.darkMode = !this.darkMode;
              localStorage.setItem('darkMode', this.darkMode);
              if (this.darkMode) document.documentElement.classList.add('dark');
              else document.documentElement.classList.remove('dark');
              if (this.availableDates.length > 0) {
                  this.processAnalytics(this.allMasterAverages[this.selectedDate] || []);
              }
          },

          async fetchLivePrices(isFirstLoad) {
              this.isSyncing = true;
              try {
                  let cacheBuster = new Date().getTime();
                  let response = await fetch(`${this.webAppUrl}?_cb=${cacheBuster}`);
                  let resData = await response.json();
                  
                  this.allMasterData = resData.dataByDate || {};
                  this.allMasterAverages = resData.averagesByDate || {};
                  this.availableDates = resData.meta.availableDates || [];
                  
                  if (isFirstLoad && this.availableDates.length > 0) {
                      this.selectedDate = this.availableDates[0];
                  }
                  
                  this.applyFilters();
                  this.processAnalytics(this.allMasterAverages[this.selectedDate] || []);
              } catch (e) {
                  console.error(e);
              } finally {
                  this.isSyncing = false;
              }
          },

          switchDateView(dateLabel) {
              this.selectedDate = dateLabel;
              this.applyFilters();
              this.processAnalytics(this.allMasterAverages[dateLabel] || []);
          },

          applyFilters() {
              let items = this.allMasterData[this.selectedDate] || [];
              let q = this.searchQuery.toLowerCase().trim();
              
              if (q) items = items.filter(i => i.name.toLowerCase().includes(q));
              if (this.selectedCategory !== 'All') {
                  items = items.filter(i => i.name.toLowerCase().includes(this.selectedCategory.toLowerCase().replace(/s$/, '')));
              }
              if (this.truSeaFilter === 'priced') {
                  items = items.filter(i => i.truSeaPerKg && i.truSeaPerKg !== '-');
              }
              
              this.filteredItems = items;
          },

          processAnalytics(averages) {
              if (!averages || averages.length === 0) return;
              
              let competitors = averages.filter(c => !c.isBrand && c.avg > 0);
              competitors.sort((a, b) => b.avg - a.avg);
              
              if (competitors.length > 0) {
                  this.highestSeller = competitors[0].name + ' (₹' + competitors[0].avg + '/KG)';
                  this.normalSeller = competitors[competitors.length - 1].name + ' (₹' + competitors[competitors.length - 1].avg + '/KG)';
              } else {
                  this.highestSeller = 'N/A';
                  this.normalSeller = 'N/A';
              }
              
              this.$nextTick(() => {
                  this.renderChart(averages);
              });
          },

          renderChart(averages) {
              let canvasEl = document.getElementById('insightsChart');
              if (!canvasEl) return;
              
              if (this.chartInstance) {
                  this.chartInstance.destroy();
              }
              
              let isDark = this.darkMode;
              let labels = averages.map(c => c.name);
              let dataVals = averages.map(c => c.avg);

              this.chartInstance = new Chart(canvasEl, {
                  type: 'bar',
                  data: {
                      labels: labels,
                      datasets: [{
                          label: 'Avg Price (₹/KG)',
                          data: dataVals,
                          backgroundColor: ['#00f2fe', '#7c3aed', '#4f46e5', '#10b981', '#f59e0b', '#3b82f6'],
                          borderRadius: 8,
                          maxBarThickness: 40
                      }]
                  },
                  options: { 
                      responsive: true, 
                      maintainAspectRatio: false,
                      plugins: { 
                          legend: { display: false },
                          tooltip: {
                              callbacks: {
                                  label: function(ctx) { return ' Avg Price: ₹' + ctx.parsed.y + '/KG'; }
                              }
                          }
                      },
                      scales: {
                          y: { 
                              beginAtZero: true,
                              grid: { color: isDark ? '#334155' : '#f1f5f9' }, 
                              ticks: { color: isDark ? '#94a3b8' : '#64748b' } 
                          },
                          x: { 
                              grid: { display: false }, 
                              ticks: { color: isDark ? '#94a3b8' : '#64748b', font: { weight: 'bold' } } 
                          }
                      }
                  }
              });
          }
      }" x-init="initEngine()">

    <div class="max-w-7xl mx-auto p-4 sm:p-6">
        <header class="mb-4 border-b border-slate-200 dark:border-slate-700 pb-3 flex justify-between items-center">
            <h1 class="text-xl sm:text-2xl font-medium text-slate-700 dark:text-slate-300">
                <span class="font-black text-blue-600 dark:text-blue-500">TruSea</span> Price Tracker
            </h1>
            <button @click="toggleTheme()" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">🌙/☀️</button>
        </header>

        <div class="mb-5 flex border-b border-slate-200 dark:border-slate-700">
            <button @click="activeViewTab = 'dashboard'; switchDateView(availableDates[0])" 
                    :class="activeViewTab === 'dashboard' ? 'border-blue-600 text-blue-600 dark:text-blue-400 font-bold border-b-2' : 'text-slate-500'"
                    class="px-5 py-2.5 text-sm">📊 Analytics Dashboard</button>
            <button @click="activeViewTab = 'table'; applyFilters();" 
                    :class="activeViewTab === 'table' ? 'border-blue-600 text-blue-600 dark:text-blue-400 font-bold border-b-2' : 'text-slate-500'"
                    class="px-5 py-2.5 text-sm">📋 Full Comparative Table</button>
        </div>

        <template x-if="activeViewTab === 'dashboard'">
            <div>
                <div class="mb-5 flex gap-2 overflow-x-auto no-scrollbar">
                    <template x-for="date in availableDates" :key="date">
                        <button @click="switchDateView(date)" 
                                :class="selectedDate === date ? 'bg-cyan-600 text-white font-bold' : 'bg-white dark:bg-slate-800 text-slate-600 border'"
                                class="px-4 py-2 text-xs rounded-full whitespace-nowrap" x-text="date"></button>
                    </template>
                </div>

                <!-- ANALYTICS CARDS & BAR CHART -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
                    <div class="lg:col-span-1 flex flex-col gap-3">
                        <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                            <span class="text-xs uppercase font-bold text-red-500 block mb-1">🔴 COSTLY MARKET VENDOR</span>
                            <div class="text-base font-black text-slate-900 dark:text-slate-100" x-text="highestSeller"></div>
                        </div>
                        <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                            <span class="text-xs uppercase font-bold text-emerald-600 block mb-1">🟢 NORMAL MARKET VENDOR</span>
                            <div class="text-base font-black text-slate-900 dark:text-slate-100" x-text="normalSeller"></div>
                        </div>
                    </div>
                    <div class="lg:col-span-2 bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                        <div class="relative h-[200px] w-full">
                            <canvas id="insightsChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- CARDS MATRIX -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                    <template x-for="item in filteredItems" :key="item.name">
                        <div class="premium-glow-card p-6 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-xl">
                            <h3 class="text-lg font-extrabold text-slate-900 dark:text-slate-100 mb-3" x-text="item.name"></h3>
                            
                            <div class="space-y-2 mb-4 bg-[#FAFAFA] dark:bg-slate-900 p-4 rounded-lg text-sm">
                                <div class="flex justify-between">
                                    <span class="text-slate-500">Current TruSea Web Price</span>
                                    <span class="font-bold" x-text="item.currentTruSeaWebPrice !== '-' ? '₹' + item.currentTruSeaWebPrice : '-'"></span>
                                </div>
                                <div class="flex justify-between border-t pt-2">
                                    <span class="font-bold">Today's Target TruSea Price</span>
                                    <span class="text-lg font-black text-cyan-600" x-text="item.truSeaPerKg !== '-' ? '₹' + item.truSeaPerKg : '-'"></span>
                                </div>
                            </div>
                            
                            <div class="border-t pt-3 space-y-2.5 text-sm">
                                <template x-for="[compName, compVal] in Object.entries(item.competitors)" :key="compName">
                                    <div class="flex justify-between items-center bg-[#FAFAFA] dark:bg-slate-900 p-2.5 rounded-lg border">
                                        <div class="flex items-center gap-1.5">
                                            <span class="font-bold text-slate-700 dark:text-slate-300" x-text="compName"></span>
                                            <!-- COMPETITOR SPECIFIC OFFER BADGE -->
                                            <template x-if="compVal.hasOffer">
                                                <span class="bg-rose-500 text-white text-[9px] font-black px-1.5 py-0.5 rounded uppercase tracking-wider animate-pulse">🔥 OFFER</span>
                                            </template>
                                        </div>
                                        <div class="flex items-center gap-2">
                                            <span class="font-extrabold" x-show="!compVal.status.toLowerCase().includes('not available') && !compVal.status.toLowerCase().includes('sold out')" x-text="compVal.price !== '-' ? '₹' + compVal.price + '/kg' : '-'"></span>
                                            <span :class="{
                                                    'bg-emerald-50 text-emerald-700 border-emerald-200': !compVal.status.toLowerCase().includes('sold out') && !compVal.status.toLowerCase().includes('not available'),
                                                    'bg-rose-50 text-rose-700 border-rose-200': compVal.status.toLowerCase().includes('sold out'),
                                                    'bg-slate-100 text-slate-500': compVal.status.toLowerCase().includes('not available')
                                                  }" 
                                                  class="text-xs font-bold px-2 py-1 rounded border" 
                                                  x-text="compVal.status"></span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <template x-if="activeViewTab === 'table'">
            <div class="overflow-x-auto rounded-xl border bg-white dark:bg-slate-800 mt-4">
                <table class="w-full text-left text-xs">
                    <thead>
                        <tr class="bg-slate-50 dark:bg-slate-900 border-b font-bold uppercase">
                            <th class="p-3">Fish Description</th>
                            <th class="p-3 text-center">TenderCuts</th>
                            <th class="p-3 text-center">Licious</th>
                            <th class="p-3 text-center">Fresh Ma</th>
                            <th class="p-3 text-center">Fresh To Home</th>
                            <th class="p-3 text-center">Supreme</th>
                            <th class="p-3 text-center bg-blue-50">TruSea Target</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y font-medium">
                        <template x-for="item in filteredItems" :key="item.name">
                            <tr>
                                <td class="p-3 font-bold" x-text="item.name"></td>
                                <template x-for="compName in ['TenderCuts', 'Licious', 'Fresh Ma', 'Fresh To Home', 'Supreme Sea Foods']" :key="compName">
                                    <td class="p-3 text-center font-mono">
                                        <div class="flex flex-col items-center gap-1">
                                            <template x-if="item.competitors[compName] && item.competitors[compName].hasOffer">
                                                <span class="bg-rose-500 text-white text-[8px] font-black px-1 rounded">🔥 OFFER</span>
                                            </template>
                                            <span x-text="item.competitors[compName] ? (item.competitors[compName].price !== '-' ? '₹' + item.competitors[compName].price + '/kg' : item.competitors[compName].status) : '-'"></span>
                                        </div>
                                    </td>
                                </template>
                                <td class="p-3 text-center font-bold bg-blue-50/50 text-blue-600" x-text="'₹' + item.truSeaPerKg"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>
    </div>
</body>
</html>
