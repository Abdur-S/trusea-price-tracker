<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruSea Live Pricing Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Premium Flat Neon Outline + Card Grow & Offset Shadow Effect */
        .neon-outline-card {
            position: relative;
            background: #111116;
            border-radius: 1rem;
            z-index: 1;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .neon-outline-card::before {
            content: ''; position: absolute; inset: 0; border-radius: 1rem; padding: 1.5px; 
            background: linear-gradient(90deg, #00f2fe, #4facfe, #9b51e0, #00f2fe);
            background-size: 300% 100%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            z-index: 2; opacity: 0; transition: opacity 0.25s ease; pointer-events: none;
        }
        .neon-outline-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0, 242, 254, 0.08), 0 10px 15px rgba(0, 0, 0, 0.4);
        }
        .neon-outline-card:hover::before { opacity: 1; animation: neonOutlineMove 2s linear infinite; }
        @keyframes neonOutlineMove { 0% { background-position: 0% 0%; } 100% { background-position: 300% 0%; } }

        /* --- GOOGLE GEMINI INSPIRED PREMIUM AI SEARCH BAR --- */
        @property --gemini-angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes geminiRotate {
            0% { --gemini-angle: 0deg; }
            100% { --gemini-angle: 360deg; }
        }

        @keyframes aiPulse {
            0%, 100% { transform: scale(1); opacity: 0.85; filter: drop-shadow(0 0 2px rgba(0,242,254,0.4)); }
            50% { transform: scale(1.12); opacity: 1; filter: drop-shadow(0 0 8px rgba(155,81,224,0.7)); }
        }

        .gemini-ai-container {
            position: relative;
            width: 100%;
            border-radius: 9999px;
            padding: 2px;
            z-index: 10;
            background: transparent;
            transition: transform 300ms cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Moving Conic Gradient Border */
        .gemini-ai-container::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            padding: 2px;
            background: conic-gradient(from var(--gemini-angle), #3085ff, #00f2fe, #4facfe, #9b51e0, #ff7beb, #3085ff);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: geminiRotate 4s linear infinite;
            transition: opacity 300ms ease;
            pointer-events: none;
            z-index: 2;
        }

        /* Blurred Soft Outer Glow Layer */
        .gemini-ai-container::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 9999px;
            background: conic-gradient(from var(--gemini-angle), #3085ff, #00f2fe, #4facfe, #9b51e0, #ff7beb, #3085ff);
            animation: geminiRotate 4s linear infinite;
            filter: blur(8px);
            opacity: 0.35;
            transition: opacity 300ms ease;
            z-index: 1;
            pointer-events: none;
        }

        /* Hover Modifications */
        .gemini-ai-container:hover {
            transform: scale(1.02);
        }
        .gemini-ai-container:hover::before {
            animation-duration: 2.5s;
        }
        .gemini-ai-container:hover::after {
            opacity: 0.65;
            filter: blur(12px);
            animation-duration: 2.5s;
        }

        /* Focus Within Modifications */
        .gemini-ai-container:focus-within {
            transform: scale(1.02);
            box-shadow: inset 0 0 12px rgba(0, 242, 254, 0.15);
        }
        .gemini-ai-container:focus-within::before {
            animation-duration: 2s;
        }
        .gemini-ai-container:focus-within::after {
            opacity: 0.85;
            filter: blur(14px);
            animation-duration: 2s;
        }

        .gemini-sparkle-pulse {
            animation: aiPulse 2.5s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-[#0B0B0F] text-slate-200 font-sans antialiased min-h-screen"
      x-data="{
          webAppUrl: 'https://script.google.com/macros/s/AKfycby3J_sLXDGhcxCSVRpCB8CboXV3hqkth8cGp5B1tfPT2EiyQ1JwPk3m8RVKXbumYiZMnA/exec',
          searchQuery: '',
          rawProducts: [], filteredItems: [],
          highestSeller: 'Calculating...', stableSeller: 'Calculating...',
          loading: true, errorMessage: '', chartInstance: null,
          
          async initEngine() {
              this.loading = true;
              this.errorMessage = '';
              try {
                  let response = await fetch(this.webAppUrl);
                  let resData = await response.json();
                  if (resData.error) { throw new Error(resData.error); }
                  
                  this.rawProducts = resData.data || [];
                  this.applyFilters();
              } catch (e) {
                  console.error(e);
                  this.errorMessage = 'Live Sync Fault: Web App connection blocked.';
              } finally {
                  this.loading = false;
              }
          },
          applyFilters() {
              let q = this.searchQuery.toLowerCase().trim();
              if (!q) {
                  this.filteredItems = this.rawProducts;
              } else {
                  this.filteredItems = this.rawProducts.filter(item => {
                      let matchName = item.name.toLowerCase().includes(q);
                      let matchComp = Object.keys(item.competitors).some(k => k.toLowerCase().includes(q));
                      return matchName || matchComp;
                  });
              }
              this.calculateMetrics();
          },
          calculateMetrics() {
              if (this.rawProducts.length === 0) return;
              let compTotals = {}; let compCounts = {};
              let totalTruSea = 0, countTruSea = 0;
              
              this.rawProducts.forEach(item => {
                  if (item.isSoldOut) return;
                  let parsedTruSea = parseFloat(item.truSeaPerKg);
                  if (!isNaN(parsedTruSea)) { totalTruSea += parsedTruSea; countTruSea++; }
                  
                  Object.entries(item.competitors).forEach(([key, compObj]) => {
                      let priceVal = parseFloat(compObj.price);
                      if (!isNaN(priceVal) && compObj.status.toLowerCase().includes('in stock')) {
                          compTotals[key] = (compTotals[key] || 0) + priceVal;
                          compCounts[key] = (compCounts[key] || 0) + 1;
                      }
                  });
              });
              
              let averages = [{ name: 'TruSea', avg: countTruSea ? totalTruSea / countTruSea : 0, isBrand: true }];
              Object.keys(compTotals).forEach(key => {
                  averages.push({ name: key, avg: compTotals[key] / compCounts[key], isBrand: false });
              });
              
              averages = averages.filter(c => c.avg > 0);
              let competitorsOnly = averages.filter(c => !c.isBrand);
              competitorsOnly.sort((a, b) => b.avg - a.avg);
              
              if (competitorsOnly.length > 0) {
                  this.highestSeller = competitorsOnly[0].name + ' (Avg: ₹' + Math.round(competitorsOnly[0].avg) + '/KG)';
                  let middleIdx = Math.floor(competitorsOnly.length / 2);
                  this.stableSeller = competitorsOnly[middleIdx].name + ' (Avg: ₹' + Math.round(competitorsOnly[middleIdx].avg) + '/KG)';
              }
              
              averages.sort((a, b) => b.avg - a.avg);
              setTimeout(() => this.renderChart(averages), 100);
          },
          renderChart(averages) {
              if (this.chartInstance) this.chartInstance.destroy();
              let canvasEl = document.getElementById('insightsChart');
              if (!canvasEl) return;
              
              // Set global chart text to light mode visibility for dark layout matching
              Chart.defaults.color = '#94a3b8';
              Chart.defaults.borderColor = '#1e1e24';
              
              this.chartInstance = new Chart(canvasEl.getContext('2d'), {
                  type: 'bar',
                  data: {
                      labels: averages.map(c => c.name),
                      datasets: [{
                          data: averages.map(c => Math.round(c.avg)),
                          backgroundColor: averages.map(c => c.isBrand ? '#00f2fe' : '#3b82f6'),
                          borderWidth: averages.map(c => c.isBrand ? 2 : 0),
                          borderColor: '#4facfe', borderRadius: 6
                      }]
                  },
                  options: { 
                      responsive: true, 
                      maintainAspectRatio: false, 
                      plugins: { legend: { display: false } },
                      scales: {
                          y: { grid: { color: '#1e1e24' } },
                          x: { grid: { display: false } }
                      }
                  }
              });
          }
      }" x-init="initEngine()">

    <div class="min-h-screen p-4 sm:p-6 max-w-7xl mx-auto">
        <!-- Dashboard Header Framework -->
        <header class="mb-10 flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-800/60 pb-5">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-white">TruSea <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 font-normal">Intelligence Portal</span></h1>
                <p class="text-xs text-slate-500 mt-1">Live Real-Time Dynamic Auto-Sync Dashboard</p>
            </div>
        </header>

        <!-- Dynamic Gemini AI Premium Search Bar Layout Implementation -->
        <div class="mb-10 max-w-2xl mx-auto" x-show="!loading && !errorMessage">
            <div class="gemini-ai-container">
                <!-- Glassmorphism Internal Control Element -->
                <div class="flex items-center w-full bg-[#0F0F14]/70 backdrop-blur-md rounded-[9999px] pl-5 pr-5 py-3.5 shadow-2xl relative z-10">
                    <!-- Left Search Icon -->
                    <svg class="w-5 h-5 text-slate-400 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    
                    <!-- Text Inputs Core -->
                    <input x-model="searchQuery" @input="applyFilters()" type="text" placeholder="Search fish names" class="w-full text-base bg-transparent border-none focus:outline-none text-white placeholder-slate-500 font-medium">
                    
                    <!-- Right Sparkle AI Icon -->
                    <svg class="w-5 h-5 text-cyan-400 ml-3 flex-shrink-0 gemini-sparkle-pulse" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4-3.9-3.8 5.4-.8L12 2z"></path>
                    </svg>
                </div>
            </div>
        </div>

        <main class="space-y-6">
            <!-- Loading Status Indicator -->
            <div x-show="loading" class="text-center py-20 text-sm text-slate-500">Syncing dynamic data arrays directly from current layout...</div>
            <div x-show="errorMessage" class="bg-red-950/40 border border-red-900/50 text-red-400 p-4 rounded-xl text-xs font-medium" x-text="errorMessage" style="display: none;"></div>

            <!-- ANCHORED STATISTICAL INSIGHTS & BENCHMARK GRAPHS -->
            <div x-show="!loading && !errorMessage" class="grid grid-cols-1 lg:grid-cols-3 gap-4" style="display: none;">
                <div class="lg:col-span-1 flex flex-col gap-3 justify-between">
                    <div class="bg-[#111116] p-4 rounded-xl border border-slate-800/80 shadow-sm">
                        <span class="text-[9px] uppercase font-bold tracking-wider text-red-400 block mb-0.5">🔴 Cost High Competitor</span>
                        <div class="text-base font-black text-white" x-text="highestSeller"></div>
                    </div>
                    <div class="bg-[#111116] p-4 rounded-xl border border-slate-800/80 shadow-sm">
                        <span class="text-[9px] uppercase font-bold tracking-wider text-emerald-400 block mb-0.5"> 🟢 Stable Cost Competitor</span>
                        <div class="text-base font-black text-white" x-text="stableSeller"></div>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-[#111116] p-4 rounded-xl border border-slate-800/80 shadow-sm">
                    <span class="text-[10px] uppercase font-bold tracking-wider text-slate-400 block mb-2">Market Price Benchmark Index Matrix (/KG)</span>
                    <div class="relative h-[110px] w-full"><canvas id="insightsChart"></canvas></div>
                </div>
            </div>

            <!-- PREMIUM MOBILE CARDS DATA GRID LAYOUT -->
            <div x-show="!loading && !errorMessage" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" style="display: none;">
                <template x-for="item in filteredItems" :key="item.name">
                    <div :class="item.isSoldOut ? 'bg-[#14141a]/40 opacity-40 select-none' : 'neon-outline-card border-slate-800/60'" class="p-5 border flex flex-col justify-between shadow-sm relative">
                        
                        <div>
                            <h3 class="text-base font-bold text-white mb-3 truncate" x-text="item.name"></h3>
                            
                            <!-- Target Column Groupings -->
                            <div class="space-y-2 mb-4 bg-[#0d0d12] p-3 rounded-xl border border-slate-900">
                                <div class="flex justify-between items-center">
                                    <span class="text-[11px] text-slate-400 font-medium">Current TruSea Price Perkg</span>
                                    <span class="text-xs font-bold text-slate-300" x-text="item.currentTruSeaWebPrice !== '-' ? '₹' + item.currentTruSeaWebPrice : '-'"></span>
                                </div>
                                <div class="flex justify-between items-center border-t border-slate-800/50 pt-2">
                                    <span class="text-[11px] text-slate-200 font-bold">TruSea Price Per Kg</span>
                                    <span class="text-lg font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-400" x-text="item.truSeaPerKg !== '-' ? '₹' + item.truSeaPerKg : '-'"></span>
                                </div>
                                <div class="flex justify-between items-center border-t border-slate-800/50 pt-2">
                                    <span class="text-[11px] text-slate-400 font-medium">Difference</span>
                                    <span :class="parseFloat(item.difference) < 0 ? 'text-emerald-400' : 'text-red-400'" class="text-xs font-bold" x-text="item.difference !== '-' ? (parseFloat(item.difference) > 0 ? '+' + item.difference : item.difference) : '-'"></span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Dynamic Competitor Block Rows -->
                        <div class="border-t border-slate-800/60 pt-2.5 space-y-2 text-xs text-slate-400">
                            <span class="block text-[8px] uppercase tracking-wider text-slate-500 font-bold mb-1">Competitor Pricing Benchmark</span>
                            <template x-for="[compName, compObj] in Object.entries(item.competitors)" :key="compName">
                                <div class="flex justify-between items-center bg-[#0d0d12] p-2 rounded-lg border border-slate-900">
                                    <span class="font-medium text-slate-400" x-text="compName"></span>
                                    <div class="flex items-center gap-2">
                                        <span class="font-bold text-slate-200" x-text="compObj.price !== '-' ? '₹' + compObj.price : '-'"></span>
                                        <span :class="compObj.status.toLowerCase().includes('in stock') ? 'bg-green-950/40 text-green-400 border border-green-900/30' : 'bg-red-950/40 text-red-400 border border-red-900/30'" 
                                              class="text-[9px] font-bold px-1.5 py-0.5 rounded-md" 
                                              x-text="compObj.status"></span>
                                    </div>
                                </div>
                            </template>
                        </div>

                    </div>
                </template>
            </div>
        </main>
    </div>
</body>
</html>
