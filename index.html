<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruSea Premium Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth Gradient Light Search Border UI */
        .premium-neon-border {
            position: relative;
            background: #ffffff;
            border-radius: 9999px;
            padding: 2.5px;
            background-image: linear-gradient(90deg, #3085ff, #00f2fe, #4facfe, #9b51e0, #ff7beb);
            background-size: 200% auto;
            transition: box-shadow 0.3s cubic-bezier(0.25, 1, 0.5, 1), transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .premium-neon-border:hover, .premium-neon-border:focus-within {
            transform: scale(1.008);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.1), 0 4px 10px rgba(155, 81, 224, 0.04);
        }
        .search-inner-workspace { background: #ffffff; border-radius: 9999px; }

        /* --- COMPACT HIGH INTENSITY PREMIUM WHITE NEON GLOW CARDS --- */
        .premium-neon-card {
            position: relative;
            background: #ffffff;
            border-radius: 0.85rem;
            z-index: 1;
            border: 1px solid #e2e8f0;
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.25s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.25s ease;
        }
        
        .premium-neon-card::before {
            content: ''; position: absolute; inset: -1px; border-radius: 0.85rem; padding: 1.5px; 
            background: linear-gradient(135deg, #00f2fe, #4facfe, #9b51e0, #ff7beb, #00f2fe);
            background-size: 300% 300%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            z-index: 2; opacity: 0; transition: opacity 0.25s ease; pointer-events: none;
        }

        /* Compact hover pop grow + refined glow tracking */
        .premium-neon-card:hover {
            transform: translateY(-4px) scale(1.015);
            border-color: transparent;
            box-shadow: 0 15px 25px rgba(0, 242, 254, 0.12), 0 8px 15px rgba(155, 81, 224, 0.06);
        }
        .premium-neon-card:hover::before { opacity: 1; animation: neonGlowShift 3s linear infinite; }
        @keyframes neonGlowShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-800 font-sans antialiased min-h-screen"
      x-data="{
          webAppUrl: 'https://script.google.com/macros/s/AKfycbyRqOuCIzU3l1PsX7No0phuf2ODItBfqvedHy3qNNaKve2wmb3lXC-837o4eCJ0bTi6hw/exec',
          searchQuery: '',
          activeSheetName: 'Searching...',
          rawProducts: [], filteredItems: [],
          highestSeller: 'Calculating...', stableSeller: 'Calculating...',
          loading: true, errorMessage: '', chartInstance: null,
          
          async initEngine() {
              this.loading = true;
              this.errorMessage = '';
              try {
                  let response = await fetch(`${this.webAppUrl}?action=get_sheet_data`);
                  let resData = await response.json();
                  if (resData.error) { throw new Error(resData.error); }
                  
                  this.rawProducts = resData.data || [];
                  this.activeSheetName = resData.meta?.activeSheet || 'Dynamic Pricing Tab';
                  this.applyFilters();
              } catch (e) {
                  console.error(e);
                  this.errorMessage = 'Sync Notice: Initializing active sheet streams... Please reload in a moment.';
              } finally {
                  this.loading = false;
              }
          },
          applyFilters() {
              let q = this.searchQuery.toLowerCase().trim();
              if (!q) {
                  this.filteredItems = this.rawProducts;
              } else {
                  this.filteredItems = this.rawProducts.filter(item => {
                      let matchName = item.name.toLowerCase().includes(q);
                      let matchComp = item.competitors ? Object.keys(item.competitors).some(k => k.toLowerCase().includes(q)) : false;
                      return matchName || matchComp;
                  });
              }
              this.calculateMetrics();
          },
          calculateMetrics() {
              if (this.rawProducts.length === 0) return;
              let compTotals = {}; let compCounts = {};
              let totalTruSea = 0, countTruSea = 0;
              
              this.rawProducts.forEach(item => {
                  let parsedTruSea = parseFloat(String(item.truSeaPerKg).replace(/[₹,]/g, ''));
                  if (!isNaN(parsedTruSea)) { totalTruSea += parsedTruSea; countTruSea++; }
                  
                  if (item.competitors) {
                      Object.entries(item.competitors).forEach(([key, compValue]) => {
                          let priceVal = parseFloat(String(compValue.price).replace(/[₹, ']/g, ''));
                          if (!isNaN(priceVal)) {
                              compTotals[key] = (compTotals[key] || 0) + priceVal;
                              compCounts[key] = (compCounts[key] || 0) + 1;
                          }
                      });
                  }
              });
              
              let averages = [{ name: 'TruSea', avg: countTruSea ? totalTruSea / countTruSea : 0, isBrand: true }];
              Object.keys(compTotals).forEach(key => {
                  if (compCounts[key] > 0) {
                      averages.push({ name: key, avg: compTotals[key] / compCounts[key], isBrand: false });
                  }
              });
              
              averages = averages.filter(c => c.avg > 0);
              let competitorsOnly = averages.filter(c => !c.isBrand);
              competitorsOnly.sort((a, b) => b.avg - a.avg);
              
              if (competitorsOnly.length > 0) {
                  this.highestSeller = competitorsOnly[0].name + ' (Avg: ₹' + Math.round(competitorsOnly[0].avg) + '/KG)';
                  let middleIdx = Math.floor(competitorsOnly.length / 2);
                  this.stableSeller = competitorsOnly[middleIdx].name + ' (Avg: ₹' + Math.round(competitorsOnly[middleIdx].avg) + '/KG)';
              }
              
              averages.sort((a, b) => b.avg - a.avg);
              setTimeout(() => this.renderChart(averages), 100);
          },
          renderChart(averages) {
              if (this.chartInstance) this.chartInstance.destroy();
              let canvasEl = document.getElementById('insightsChart');
              if (!canvasEl) return;
              
              this.chartInstance = new Chart(canvasEl.getContext('2d'), {
                  type: 'bar',
                  data: {
                      labels: averages.map(c => c.name),
                      datasets: [{
                          data: averages.map(c => Math.round(c.avg)),
                          backgroundColor: averages.map(c => c.isBrand ? '#00f2fe' : (c.name.toLowerCase().includes('licious') ? '#6366f1' : '#a855f7')),
                          borderRadius: 6,
                          maxBarThickness: 35
                      }]
                  },
                  options: { 
                      responsive: true, 
                      maintainAspectRatio: false, 
                      plugins: { legend: { display: false } },
                      scales: {
                          y: { grid: { color: '#F1F5F9' }, ticks: { font: { size: 10 } } },
                          x: { grid: { display: false }, ticks: { font: { size: 10 } } }
                      }
                  }
              });
          }
      }" x-init="initEngine()">

    <div class="min-h-screen p-4 sm:p-6 max-w-7xl mx-auto">
        <!-- Dashboard Header framework -->
        <header class="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-200 pb-4 gap-4">
            <div>
                <h1 class="text-2xl font-black tracking-tight text-slate-900">TruSea <span class="text-cyan-600 font-normal">Intelligence Portal</span></h1>
                <p class="text-xs text-slate-500">Live Auto-Sync Tracker Framework</p>
            </div>
            <div class="bg-white px-3 py-1.5 rounded-xl text-[11px] font-bold border border-slate-200 shadow-3xs flex items-center gap-2" x-show="!loading">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                Active Sheet: <span class="text-cyan-600 font-black" x-text="activeSheetName"></span>
            </div>
        </header>

        <!-- Dynamic Premium Clean Search Workspace -->
        <div class="mb-6 max-w-xl mx-auto" x-show="!loading && !errorMessage">
            <div class="premium-neon-border">
                <div class="search-inner-workspace flex items-center w-full px-4 py-3 shadow-xs relative z-10">
                    <svg class="w-4 h-4 text-slate-400 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <input x-model="searchQuery" @input="applyFilters()" type="text" placeholder="Search fish names or competitor brand metrics..." class="w-full text-sm bg-transparent border-none focus:outline-none text-slate-800 placeholder-slate-400 font-medium">
                </div>
            </div>
        </div>

        <main class="space-y-6">
            <div x-show="loading" class="text-center py-20 text-xs font-medium text-slate-400">Loading dynamic data catalog channels...</div>
            <div x-show="errorMessage" class="bg-amber-50 border border-amber-200 text-amber-800 p-4 rounded-xl text-xs font-medium shadow-3xs" x-text="errorMessage" style="display: none;"></div>

            <!-- INSIGHT METRICS & CHARTS -->
            <div x-show="!loading && !errorMessage" class="grid grid-cols-1 lg:grid-cols-3 gap-4" style="display: none;">
                <div class="lg:col-span-1 flex flex-col gap-3 justify-between">
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-3xs">
                        <span class="text-[9px] uppercase font-bold tracking-wider text-red-500 block mb-0.5">🔴 Cost High Competitor</span>
                        <div class="text-sm font-black text-slate-900" x-text="highestSeller"></div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-3xs">
                        <span class="text-[9px] uppercase font-bold tracking-wider text-emerald-600 block mb-0.5">🟢 Stable Cost Competitor</span>
                        <div class="text-sm font-black text-slate-900" x-text="stableSeller"></div>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-white p-4 rounded-xl border border-slate-200 shadow-3xs">
                    <span class="text-[9px] uppercase font-bold tracking-wider text-slate-400 block mb-1">Market Price Index Benchmark Matrix (/KG)</span>
                    <div class="relative h-[95px] w-full"><canvas id="insightsChart"></canvas></div>
                </div>
            </div>

            <!-- COMPACT SMALL MOBILE CARDS DATA GRID LAYOUT (Optimized 4-column layout matrix) -->
            <div x-show="!loading && !errorMessage" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" style="display: none;">
                <template x-for="item in filteredItems" :key="item.name">
                    <div :class="item.isSoldOut ? 'bg-slate-100/70 opacity-60' : ''" class="premium-neon-card p-4 flex flex-col justify-between relative">
                        
                        <div>
                            <!-- Compact Product Label text -->
                            <h3 class="text-xs font-bold text-slate-800 mb-2.5 truncate" :title="item.name" x-text="item.name"></h3>
                            
                            <!-- First 3 Mandatory Columns Layout Mappings -->
                            <div class="space-y-1.5 mb-3 bg-slate-50 p-2.5 rounded-lg border border-slate-100/60">
                                <div class="flex justify-between items-center text-[10px]">
                                    <span class="text-slate-400 font-medium">Current TruSea Price Perkg</span>
                                    <span class="font-bold text-slate-600" x-text="item.currentTruSeaWebPrice !== '-' ? '₹' + item.currentTruSeaWebPrice : '-'"></span>
                                </div>
                                <div class="flex justify-between items-center border-t border-slate-200/40 pt-1.5">
                                    <span class="text-[10px] text-slate-700 font-bold">TruSea Price Per Kg</span>
                                    <span class="text-sm font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-600 to-blue-600" x-text="item.truSeaPerKg !== '-' ? '₹' + item.truSeaPerKg : '-'"></span>
                                </div>
                                <div class="flex justify-between items-center border-t border-slate-200/40 pt-1.5 text-[10px]">
                                    <span class="text-slate-400 font-medium">Difference</span>
                                    <span :class="parseFloat(item.difference) < 0 ? 'text-emerald-600' : 'text-red-500'" class="font-bold" x-text="item.difference !== '-' ? (parseFloat(item.difference) > 0 ? '+' + item.difference : item.difference) : '-'"></span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Dynamic Competitor Columns Mapping Grid -->
                        <div class="border-t border-slate-100 pt-2 space-y-1.5 text-[10px] text-slate-600">
                            <template x-if="item.competitors">
                                <template x-for="[compName, compVal] in Object.entries(item.competitors)" :key="compName">
                                    <div class="flex justify-between items-center bg-slate-50/30 px-2 py-1 rounded-md border border-slate-100/80">
                                        <span class="font-medium text-slate-500 text-[9px]" x-text="compName"></span>
                                        <div class="flex items-center gap-1.5">
                                            <span class="font-bold text-slate-700 text-[10px]" x-text="compVal.price !== '-' ? '₹' + compVal.price : '-'"></span>
                                            <span :class="compVal.status.toLowerCase().includes('in stock') ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-rose-50 text-rose-600 border-rose-100'" 
                                                  class="text-[8px] font-bold px-1 py-0.2 rounded-sm border" 
                                                  x-text="compVal.status.toLowerCase().includes('in stock') ? 'In' : 'Out'"></span>
                                        </div>
                                    </div>
                                </template>
                            </template>
                        </div>

                    </div>
                </template>
            </div>
        </main>
    </div>
</body>
</html>
